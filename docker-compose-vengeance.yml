# Internet Health & Status Engine — Docker Compose
# VENGEANCE · Windows / Docker Desktop · 32 CPUs · 31GB RAM · x86_64
# No Pi-era memory limits — resources allocated generously

name: inet-health-engine

x-logging: &default-logging
  driver: "json-file"
  options: {max-size: "50m", max-file: "5"}

x-restart: &default-restart
  restart: unless-stopped

x-collector-env: &collector-env
  REDIS_URL: redis://redis:6379/0
  TIMESCALE_DSN: postgresql://${TIMESCALE_USER:-inetuser}:${TIMESCALE_PASSWORD:-changeme_timescale}@timescaledb:5432/${TIMESCALE_DB:-inethealth}
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/changeme_neo4j}
  ES_URL: http://elasticsearch:9200
  BGP_WINDOW_SECONDS: ${BGP_WINDOW_SECONDS:-60}
  CLOUDFLARE_RADAR_TOKEN: ${CLOUDFLARE_RADAR_TOKEN:-}
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_PASSWORD:-changeme_minio}
  POLL_INTERVAL: "300"
  REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
  REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
  REDDIT_USER_AGENT: "inet-health-engine/0.1"
  X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}

networks:
  inet-health:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  timescale-data:
    driver: local
    driver_opts: {type: none, o: bind, device: ./data/timescaledb}
  neo4j-data:
    driver: local
    driver_opts: {type: none, o: bind, device: ./data/neo4j}
  es-data:
    driver: local
    driver_opts: {type: none, o: bind, device: ./data/elasticsearch}
  redis-data:
    driver: local
    driver_opts: {type: none, o: bind, device: ./data/redis}
  minio-data:
    driver: local
    driver_opts: {type: none, o: bind, device: ./data/minio}

services:

  # ── STORAGE ──────────────────────────────────────────────────────

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    <<: *default-restart
    logging: *default-logging
    networks:
      inet-health:
        ipv4_address: 172.30.0.10
    ports: ["5432:5432"]
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./docker/timescale-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-inethealth}
      POSTGRES_USER: ${TIMESCALE_USER:-inetuser}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-changeme_timescale}
    command: >
      postgres
      -c shared_buffers=2GB
      -c work_mem=64MB
      -c maintenance_work_mem=512MB
      -c effective_cache_size=8GB
      -c max_connections=100
      -c max_parallel_workers=8
      -c max_parallel_workers_per_gather=4
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-inetuser} -d ${TIMESCALE_DB:-inethealth}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    <<: *default-restart
    logging: *default-logging
    networks:
      inet-health:
        ipv4_address: 172.30.0.11
    ports: ["7474:7474", "7687:7687"]
    volumes: [neo4j-data:/data]
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/changeme_neo4j}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2g
      NEO4J_dbms_memory_pagecache_size: 1g
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    <<: *default-restart
    logging: *default-logging
    networks:
      inet-health:
        ipv4_address: 172.30.0.12
    ports: ["9200:9200"]
    volumes: [es-data:/usr/share/elasticsearch/data]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx4g
      - cluster.name=inet-health-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock: {soft: -1, hard: -1}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v red"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    <<: *default-restart
    logging: *default-logging
    networks:
      inet-health:
        ipv4_address: 172.30.0.13
    ports: ["6379:6379"]
    volumes:
      - redis-data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    <<: *default-restart
    logging: *default-logging
    networks:
      inet-health:
        ipv4_address: 172.30.0.14
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio-data:/data]
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-changeme_minio}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── COLLECTORS ────────────────────────────────────────────────────

  collector-ris:
    build: {context: ./collectors, dockerfile: Dockerfile}
    image: inet-health-collector:latest
    container_name: collector-ris
    <<: *default-restart
    logging: *default-logging
    networks: [inet-health]
    volumes: [./collectors:/app]
    environment: {<<: *collector-env}
    command: python -m collectors.ripe_ris_collector
    depends_on:
      timescaledb: {condition: service_healthy}
      redis: {condition: service_healthy}
      neo4j: {condition: service_healthy}

  collector-traffic:
    build: {context: ./collectors, dockerfile: Dockerfile}
    image: inet-health-collector:latest
    container_name: collector-traffic
    <<: *default-restart
    logging: *default-logging
    networks: [inet-health]
    volumes: [./collectors:/app]
    environment: {<<: *collector-env}
    command: python -m collectors.traffic_collector
    depends_on:
      timescaledb: {condition: service_healthy}
      redis: {condition: service_healthy}

  collector-community:
    build: {context: ./collectors, dockerfile: Dockerfile}
    image: inet-health-collector:latest
    container_name: collector-community
    <<: *default-restart
    logging: *default-logging
    networks: [inet-health]
    volumes: [./collectors:/app]
    environment: {<<: *collector-env}
    command: python -m collectors.community_collector
    depends_on:
      elasticsearch: {condition: service_healthy}
      redis: {condition: service_healthy}
      timescaledb: {condition: service_healthy}

  collector-atlas:
    build: {context: ./collectors, dockerfile: Dockerfile}
    image: inet-health-collector:latest
    container_name: collector-atlas
    <<: *default-restart
    logging: *default-logging
    networks: [inet-health]
    volumes: [./collectors:/app]
    environment: {<<: *collector-env}
    command: python -m collectors.ripe_atlas_collector
    depends_on:
      timescaledb: {condition: service_healthy}
      redis: {condition: service_healthy}

  collector-rpki:
    build: {context: ./collectors, dockerfile: Dockerfile}
    image: inet-health-collector:latest
    container_name: collector-rpki
    <<: *default-restart
    logging: *default-logging
    networks: [inet-health]
    volumes: [./collectors:/app]
    environment: {<<: *collector-env}
    command: python -m collectors.rpki_collector
    depends_on:
      timescaledb: {condition: service_healthy}
      redis: {condition: service_healthy}

  collector-topology:
    build: {context: ./collectors, dockerfile: Dockerfile}
    image: inet-health-collector:latest
    container_name: collector-topology
    <<: *default-restart
    logging: *default-logging
    networks: [inet-health]
    volumes: [./collectors:/app]
    environment: {<<: *collector-env}
    command: python -m collectors.neo4j_topology
    depends_on:
      timescaledb: {condition: service_healthy}
      neo4j: {condition: service_healthy}
      redis: {condition: service_healthy}

  collector-baseline:
    build: {context: ./collectors, dockerfile: Dockerfile}
    image: inet-health-collector:latest
    container_name: collector-baseline
    <<: *default-restart
    logging: *default-logging
    networks: [inet-health]
    volumes: [./collectors:/app]
    environment: {<<: *collector-env}
    command: python -m collectors.baseline_modeler
    depends_on:
      timescaledb: {condition: service_healthy}
      redis: {condition: service_healthy}

  # ── CELERY ────────────────────────────────────────────────────────

  celery-worker:
    build: {context: ./collectors, dockerfile: Dockerfile}
    image: inet-health-collector:latest
    container_name: celery-worker
    <<: *default-restart
    logging: *default-logging
    networks: [inet-health]
    volumes: [./collectors:/app]
    environment: {<<: *collector-env}
    command: celery -A collectors.celery_app worker --loglevel=info --concurrency=8
    depends_on:
      redis: {condition: service_healthy}
      timescaledb: {condition: service_healthy}

  celery-beat:
    build: {context: ./collectors, dockerfile: Dockerfile}
    image: inet-health-collector:latest
    container_name: celery-beat
    <<: *default-restart
    logging: *default-logging
    networks: [inet-health]
    volumes: [./collectors:/app]
    environment: {<<: *collector-env}
    command: celery -A collectors.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    depends_on:
      redis: {condition: service_healthy}

  # ── API ───────────────────────────────────────────────────────────

  api:
    build: {context: ./api, dockerfile: Dockerfile}
    container_name: inet-health-api
    <<: *default-restart
    logging: *default-logging
    networks:
      inet-health:
        ipv4_address: 172.30.0.20
    ports: ["8000:8000"]
    volumes: [./api:/app]
    environment:
      REDIS_URL: redis://redis:6379/0
      TIMESCALE_DSN: postgresql://${TIMESCALE_USER:-inetuser}:${TIMESCALE_PASSWORD:-changeme_timescale}@timescaledb:5432/${TIMESCALE_DB:-inethealth}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/changeme_neo4j}
      ES_URL: http://elasticsearch:9200
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --workers 4
    depends_on:
      timescaledb: {condition: service_healthy}
      redis: {condition: service_healthy}
      elasticsearch: {condition: service_healthy}

  # ── FRONTEND ──────────────────────────────────────────────────────

  frontend:
    build: {context: ./frontend, dockerfile: Dockerfile}
    container_name: inet-health-frontend
    <<: *default-restart
    logging: *default-logging
    networks:
      inet-health:
        ipv4_address: 172.30.0.30
    ports: ["3000:80"]
    depends_on: [api]
