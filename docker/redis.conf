# Redis config for inet-health-engine
bind 0.0.0.0
protected-mode no
port 6379

# Persistence — RDB snapshot
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# AOF for better durability on event streams
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Streams (for BGP/community pub-sub)
stream-node-max-bytes 4096
stream-node-max-entries 100
